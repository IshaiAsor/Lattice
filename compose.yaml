  ollama:
    # 1. Point to your custom pre-baked Dockerfile
    build:
      context: .
      dockerfile: Dockerfile.ollama
    container_name: ollama_service
    # 2. Force the port to bind directly to your Windows loopback adapter
    ports:
      - '127.0.0.1:11434:11434'
    volumes:
