<mat-card>
    <mat-card-header>
    <mat-card-title>Edit User Action</mat-card-title>
  </mat-card-header>
  <mat-card-content>


 <form [formGroup]="userActionForm" >
          <div class="form-container">

    <mat-form-field appearance="outline">
          <mat-label>name</mat-label>
          <input matInput formControlName="name" required placeholder="e.g. Turn On Light" />
        </mat-form-field>

   <mat-form-field appearance="outline">
          <mat-label>type</mat-label>
          <mat-select formControlName="type" required>
            <mat-option
              *ngFor="let googleActionType of actionTypes$ | async"
              value="{{ googleActionType.id }}"
            >
              {{ googleActionType.name }}
            </mat-option>
          </mat-select>
        </mat-form-field>

          <mat-form-field appearance="outline">
          <mat-label>trait</mat-label>
          <mat-select formControlName="trait" required>
            <mat-option
              *ngFor="let googleActionTrait of actionTraits$ | async"
              value="{{ googleActionTrait.id }}"
            >
              {{ googleActionTrait.name }}
            </mat-option>
          </mat-select>
        </mat-form-field>
        <div *ngFor="let pin of userActionForm.value.pins; index as i">
          {{pin|json}}
          <button (click)="deletePin(i)">Delete</button>
        </div>        
      </div>
    </form>
    <form [formGroup]="actionPinGroup">
          <div class="form-container">
            <mat-form-field appearance="outline">
              <mat-label>Pin number</mat-label>
              <input matInput formControlName="pinNumber" required placeholder="Pin number" />
        </mat-form-field>
      
            <mat-form-field appearance="outline">
          <mat-label>pin Mode</mat-label>
          <mat-select formControlName="pinMode" required>
            <mat-option value="0">INPUT</mat-option>
            <mat-option value="1">OUTPUT</mat-option>
          </mat-select>
        </mat-form-field>

              <mat-form-field appearance="outline">
          <mat-label>pin Type</mat-label>
          <mat-select formControlName="pinType" required>
            <mat-option value="0">DIGITAL</mat-option>
            <mat-option value="1">ANALOG</mat-option>
          </mat-select>
        </mat-form-field>
        
             <mat-form-field appearance="outline">
          <mat-label>Device</mat-label>
          <mat-select formControlName="deviceId" required>
            <mat-option
              *ngFor="let device of userDevices$ | async"
              value="{{ device.id }}">
              {{ device.deviceName }}
            </mat-option>
          </mat-select>
        </mat-form-field>
      </div>
              <button mat-raised-button color="primary" [disabled]="actionPinGroup.invalid" (click)="addPin()">
          Add
        </button>

    </form>

            <button mat-raised-button color="primary" 
            [disabled]="userActionForm.invalid"
            (click)="saveAction()">
          Save
        </button>

    </mat-card-content>
</mat-card>
