server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 1024;

    # Aggressive cache for hashed assets (Angular appends content hash to filenames)
    location ~* \.(js|css|woff2?|ttf|eot|ico|png|jpg|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # No cache for index.html — ensures users always get the latest shell
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Angular HTML5 routing — all routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Health check endpoint for k8s probes
    location /health {
        access_log off;
        return 200 'ok';
        add_header Content-Type text/plain;
    }
}
